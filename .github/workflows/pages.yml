name: Hexo Deploy  
on:  
  push:  
    branches: [main]  

jobs:  
  build:  
    runs-on: ubuntu-latest  
    steps:  
      - name: 纯净 Checkout（无任何子模块干扰）
        uses: actions/checkout@v4
        with:  
          fetch-depth: 0  # 仅拉取完整历史，解决 Hexo 时间问题  
          token: ${{ secrets.GITHUB_TOKEN }}  # 仅授权，不碰子模块  

      - name: 安装 Node.js  
        uses: actions/setup-node@v4  
        with:  
          node-version: 20  

      - name: 安装依赖（含 Yun 主题，通过 package.json）  
        run: npm install  

      - name: 生成静态网站  
        run: npm run build  

      - name: 部署到 GitHub Pages  
        uses: peaceiris/actions-gh-pages@v4  
        with:  
          github_token: ${{ secrets.GITHUB_TOKEN }}  
          publish_dir: ./public  
          publish_branch: gh-pages  